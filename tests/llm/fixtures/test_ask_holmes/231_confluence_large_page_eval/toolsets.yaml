# Confluence-only toolset config.  Bash is explicitly disabled to simulate
# deployments without shell access (Slack bot, API server).  Without bash,
# the filesystem-storage fallback for oversized tool responses is unavailable,
# so pages exceeding the per-tool token limit (~25K tokens) will have their
# content dropped entirely.
toolsets:
  confluence:
    enabled: true
    config:
      api_url: "{{ env.CONFLUENCE_BASE_URL }}"
      user: "{{ env.CONFLUENCE_SA_USER }}"
      api_key: "{{ env.CONFLUENCE_SA_API_KEY }}"
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
  bash:
    enabled: false
  internet:
    enabled: false
  connectivity_check:
    enabled: false
  robusta:
    enabled: false
