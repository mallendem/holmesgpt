# MCP Atlassian server (stdio mode via uvx) for Confluence image attachment tests
toolsets:
  atlassian-mcp:
    type: mcp
    enabled: true
    config:
      mode: stdio
      command: "uvx"
      args: ["mcp-atlassian"]
      env:
        CONFLUENCE_URL: "{{ env.CONFLUENCE_BASE_URL }}"
        CONFLUENCE_USERNAME: "{{ env.CONFLUENCE_SA_USER }}"
        CONFLUENCE_API_TOKEN: "{{ env.CONFLUENCE_SA_API_KEY }}"
        READ_ONLY_MODE: "true"
  confluence:
    enabled: false
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
